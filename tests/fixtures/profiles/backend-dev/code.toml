[workspace]
name = "backend:code"
output = "primary"
index = 1
focus = "editor"

[[columns]]
id = "main"
width = 0.62

[[columns.windows]]
id = "editor"
command = ["code", "~/src/backend"]

[columns.windows.match]
app_id = "code"
title_regex = "backend"

[[columns]]
id = "tools"
width = 0.38

[[columns.windows]]
id = "shell"
command = ["ghostty", "--working-directory", "~/src/backend"]

[columns.windows.match]
app_id = "com.mitchellh.ghostty"
